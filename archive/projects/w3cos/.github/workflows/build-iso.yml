name: Build ISO

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Upload ISO to GitHub Release"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BUILDROOT_VERSION: "2024.11.1"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential ncurses-dev wget python3 cpio unzip rsync bc

      - name: Build W3C OS Shell
        run: cargo build --release -p w3cos-cli

      - name: Cache Buildroot
        uses: actions/cache@v4
        with:
          path: build/buildroot-${{ env.BUILDROOT_VERSION }}
          key: buildroot-${{ env.BUILDROOT_VERSION }}

      - name: Download Buildroot
        run: |
          mkdir -p build && cd build
          if [ ! -d "buildroot-${BUILDROOT_VERSION}" ]; then
            wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.xz"
            tar xf "buildroot-${BUILDROOT_VERSION}.tar.xz"
            rm "buildroot-${BUILDROOT_VERSION}.tar.xz"
          fi

      - name: Build ISO
        run: |
          cd "build/buildroot-${BUILDROOT_VERSION}"
          export W3COS_BIN="${GITHUB_WORKSPACE}/target/release/w3cos"
          cp "${GITHUB_WORKSPACE}/system/buildroot/w3cos_x86_64_defconfig" configs/
          make w3cos_x86_64_defconfig
          make -j$(nproc)
          cp output/images/rootfs.iso9660 "${GITHUB_WORKSPACE}/w3cos.iso"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: w3cos-iso
          path: w3cos.iso

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.upload_release
        uses: softprops/action-gh-release@v2
        with:
          files: w3cos.iso
          tag_name: ${{ github.ref_name || 'latest' }}
          generate_release_notes: true
